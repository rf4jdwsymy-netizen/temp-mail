<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Temp Mail Futuristic</title>
<style>
    body {
        margin: 0;
        font-family: 'Orbitron', sans-serif;
        background: linear-gradient(160deg, #0f0c29, #302b63, #24243e);
        color: #fff;
        display: flex;
        flex-direction: column;
        align-items: center;
        padding: 20px;
    }
    h1 { margin-bottom: 20px; }

    button {
        background: rgba(255,255,255,0.1);
        border: 1px solid #0ff;
        color: #0ff;
        padding: 5px 12px;
        margin-left: 5px;
        cursor: pointer;
        border-radius: 5px;
        transition: 0.2s;
        font-family: 'Orbitron', sans-serif;
    }
    button:hover {
        background: rgba(0,255,255,0.2);
    }

    .container {
        width: 100%;
        max-width: 800px;
        margin-bottom: 30px;
    }

    .mail-item, .password-item {
        display: flex;
        justify-content: space-between;
        background: rgba(0,255,255,0.05);
        border: 1px solid #0ff;
        padding: 8px;
        margin-bottom: 5px;
        border-radius: 5px;
        overflow-x: auto;
    }

    .mail-log {
        width: 100%;
        height: 300px;
        overflow-y: scroll;
        background: rgba(0,255,255,0.05);
        border: 1px solid #0ff;
        padding: 10px;
        border-radius: 5px;
    }

    .mail-log-item {
        margin-bottom: 5px;
        border-bottom: 1px solid rgba(0,255,255,0.2);
        padding-bottom: 3px;
    }
</style>
</head>
<body>

<h1>Temp Mail System</h1>

<div class="container">
    <h2>Generated Emails</h2>
    <div id="mailList"></div>
    <button onclick="generateMail()">Create Temp Email</button>
</div>

<div class="container">
    <h2>Generated Passwords</h2>
    <div id="passwordList"></div>
    <button onclick="generatePassword()">Create Password</button>
</div>

<div class="container">
    <h2>Mail Log</h2>
    <div id="mailLog" class="mail-log"></div>
    <button onclick="refreshLog()">Update Mail Log</button>
</div>

<script>
const mailListEl = document.getElementById('mailList');
const passwordListEl = document.getElementById('passwordList');
const mailLogEl = document.getElementById('mailLog');

let mails = JSON.parse(localStorage.getItem('mails') || '[]');
let passwords = JSON.parse(localStorage.getItem('passwords') || '[]');
let mailLog = JSON.parse(localStorage.getItem('mailLog') || '[]');

renderMails();
renderPasswords();
renderMailLog();

// ===============================
// メール生成
// ===============================
function generateMail() {
    if (mails.length >= 2) {
        alert("You can only create 2 temp emails!");
        return;
    }

    const chars = 'abcdefghijklmnopqrstuvwxyz0123456789';
    let username = '';
    for (let i = 0; i < 10; i++) {
        username += chars[Math.floor(Math.random() * chars.length)];
    }

    const address = username + '@sharebot.net';
    const password = 'Pass1234!';

    mails.push({address, password});
    localStorage.setItem('mails', JSON.stringify(mails));
    renderMails();
}

// ===============================
// メール表示
// ===============================
function renderMails() {
    mailListEl.innerHTML = '';
    mails.forEach((m, i) => {
        const div = document.createElement('div');
        div.className = 'mail-item';
        div.innerHTML = `
            <span>${m.address}</span>
            <span>${m.password}</span>
            <div>
                <button onclick="copyToClipboard('${m.address}')">Copy Email</button>
                <button onclick="copyToClipboard('${m.password}')">Copy Password</button>
                <button onclick="deleteMail(${i})">Delete Email</button>
            </div>
        `;
        mailListEl.appendChild(div);
    });
}

function deleteMail(index) {
    mails.splice(index, 1);
    localStorage.setItem('mails', JSON.stringify(mails));
    renderMails();
}

// ===============================
// パスワード生成
// ===============================
function generatePassword() {
    const chars = 'ABCDEFGHIJKLMNOPQRSTUVWXYZabcdefghijklmnopqrstuvwxyz0123456789';
    let pw = [];

    for (let b = 0; b < 3; b++) {
        let block = '';
        for (let i = 0; i < 6; i++) {
            block += chars[Math.floor(Math.random() * chars.length)];
        }
        pw.push(block);
    }

    const password = pw.join('-');
    passwords.push(password);
    localStorage.setItem('passwords', JSON.stringify(passwords));
    renderPasswords();
}

function renderPasswords() {
    passwordListEl.innerHTML = '';
    passwords.slice(-10).forEach(p => {
        const div = document.createElement('div');
        div.className = 'password-item';
        div.innerHTML = `
            <span>${p}</span>
            <button onclick="copyToClipboard('${p}')">Copy Password</button>
        `;
        passwordListEl.appendChild(div);
    });
}

// ===============================
// コピー
// ===============================
function copyToClipboard(text) {
    navigator.clipboard.writeText(text);
    alert(`Copied: ${text}`);
}

// ===============================
// メール受信
// ===============================
function receiveMailFor(address, subject, content) {
    const exists = mails.some(m => m.address === address);
    if (!exists) return;

    mailLog.unshift(`[${subject}] ${content}`);
    localStorage.setItem('mailLog', JSON.stringify(mailLog));
    renderMailLog();
}

function renderMailLog() {
    mailLogEl.innerHTML = '';
    mailLog.forEach(item => {
        const div = document.createElement('div');
        div.className = 'mail-log-item';
        div.textContent = item;
        mailLogEl.appendChild(div);
    });
}

function refreshLog() {
    renderMailLog();
}

// ===============================
// ページロード時にダミー受信（例として登録メアドだけ受信可能）
// ===============================
setInterval(() => {
    mails.forEach(m => {
        if (Math.random() < 0.01) { // ランダムでメール受信例
            receiveMailFor(m.address, "Verification Code", "Code: 1234");
        }
    });
}, 5000);

</script>

</body>
</html>
